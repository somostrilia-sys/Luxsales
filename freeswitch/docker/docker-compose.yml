version: '3.8'

services:
  freeswitch:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: walk-freeswitch
    restart: unless-stopped
    network_mode: host  # Necessário para SIP/RTP (muitas portas UDP)
    environment:
      # Supabase
      - SUPABASE_URL=https://ecaduzwautlpzpvjognr.supabase.co
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      # FreeSWITCH ESL
      - ESL_HOST=127.0.0.1
      - ESL_PORT=8021
      - ESL_PASSWORD=${ESL_PASSWORD:-WalkVoIP2026!}
      # SIP Trunk (preencher com dados da Nvoip/Vono)
      - SIP_TRUNK_HOST=${SIP_TRUNK_HOST}
      - SIP_TRUNK_USER=${SIP_TRUNK_USER}
      - SIP_TRUNK_PASS=${SIP_TRUNK_PASS}
      - SIP_TRUNK_PORT=${SIP_TRUNK_PORT:-5060}
      # AI Pipeline
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      # Servidor
      - PUBLIC_IP=${PUBLIC_IP}
      - DOMAIN=${DOMAIN:-vps.holdingwalk.com.br}
    volumes:
      - freeswitch-recordings:/var/lib/freeswitch/recordings
      - freeswitch-logs:/var/log/freeswitch
      - ./ssl:/etc/freeswitch/tls  # Certificados TLS para WebRTC
    healthcheck:
      test: ["CMD", "fs_cli", "-x", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  freeswitch-recordings:
    driver: local
  freeswitch-logs:
    driver: local
