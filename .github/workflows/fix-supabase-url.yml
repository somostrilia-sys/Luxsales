name: Fix Supabase URL
on:
  push:
    branches: [main]

jobs:
  fix-url:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Fix Supabase client.ts
        run: |
          cat > src/integrations/supabase/client.ts << 'EOF'
import { createClient } from '@supabase/supabase-js';
export const supabase = createClient(
  "https://ecaduzwautlpzpvjognr.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjYWR1endhdXRscHpwdmpvZ25yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDQ1MTcsImV4cCI6MjA4ODU4MDUxN30.LinR7PIoK7n79hWjbSJ3EgDwA_y6uN-HfQnOk7GgYi4"
);
export default supabase;
EOF
      
      - name: Commit fix if changed
        run: |
          git config user.name "Bolt Fix"
          git config user.email "bolt@holdingwalk.com.br"
          git add src/integrations/supabase/client.ts
          git diff --cached --quiet || git commit -m "fix: force correct Supabase URL [skip ci]"
          git push
